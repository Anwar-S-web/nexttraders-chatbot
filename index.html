<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NextTraders Chatbot</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #007bff;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

    #chatbox {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      height: 400px;
      background: white;
      border: 1px solid #ccc;
      display: none;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      border-bottom: 1px solid #ccc;
    }

    #input {
      display: flex;
    }

    #input input {
      flex: 1;
      padding: 10px;
      border: none;
      border-top: 1px solid #ccc;
    }

    #input button {
      padding: 10px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button id="chat-button">💬</button>

<div id="chatbox">
  <div id="messages"></div>
  <div id="input">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const chatButton = document.getElementById("chat-button");
  const chatbox = document.getElementById("chatbox");
  const messages = document.getElementById("messages");

  chatButton.onclick = () => {
    chatbox.style.display = chatbox.style.display === "flex" ? "none" : "flex";
  };

  async function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value;

    if (!text) return;

    messages.innerHTML += "<div><b>You:</b> " + text + "</div>";

    input.value = "";

    const response = await fetch("https://n8n.tusmonet.com/webhook/nexttraders-chat", {      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    const data = await response.text();

    messages.innerHTML += "<div><b>Nexa:</b> " + data + "</div>";
    messages.scrollTop = messages.scrollHeight;
  }
</script>

</body>
</html>
